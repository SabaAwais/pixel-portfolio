    <script>
        const text ="I'm Saba, a beginner WebApp developer\n\nP.s I built this website using HTMl, CSS and a bit of JS (no frameworks used!)";
        let index=0;

        function typeLetter() {
            if (index < text.length) {

                document.getElementById("typing-text").textContent += text.charAt(index);
                index ++;
                setTimeout(typeLetter, 45);
            }
        }

        typeLetter();
    </script>
