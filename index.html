    <script>
        const text ="\n\nWelcome to my Portfolio!\n\nI'm Saba, a beginner WebApp developer";
        let index=0;

        function typeLetter() {
            if (index < text.length) {

                document.getElementById("typing-text").textContent += text.charAt(index);
                index ++;
                setTimeout(typeLetter, 45);
            }
        }

        typeLetter();
